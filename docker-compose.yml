version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-l2cs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-l2cs_dev}
      POSTGRES_DB: ${POSTGRES_DB:-l2cs_erp}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
